name: Publish NuGet Package

on:
  push:
    tags:
      - 'v*'  # Dispara quando uma tag como v1.0.0 for criada

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # Necessário para publicar no GitHub Packages

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Pack
        run: dotnet pack src/EdiHybridCache/EdiHybridCache.csproj --configuration Release --no-build --output ./nupkg

      - name: Add GitHub Packages source
        run: |
          dotnet nuget add source --username ${{ github.actor }} \
            --password ${{ secrets.GITHUB_TOKEN }} \
            --store-password-in-clear-text \
            --name github "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

      - name: Push to GitHub Packages
        run: |
          dotnet nuget push "./nupkg/*.nupkg" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source "github"
